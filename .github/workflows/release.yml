# Release workflow — npm publish with provenance.
#
# Phase C2: shifts publishing from local developer machines to GitHub Actions
# with OIDC. Each release gets a SLSA-style attestation linked from the npm
# package page, so consumers can verify the artifact was built from a
# specific commit by this workflow.
#
# Triggers:
#   - Push of a tag matching v*.*.* (e.g. v2.1.0)
#   - Manual dispatch (for republishing or dry-runs)
#
# Required repo configuration:
#   - "id-token: write" permission (for OIDC)
#   - "contents: read" permission (for checkout)
#   - npm package configured for "publish access from GitHub" with
#     trusted-publisher OIDC (no NPM_TOKEN secret needed)

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish --dry-run only'
        required: false
        default: 'false'

permissions:
  contents: read
  id-token: write   # required for npm provenance

jobs:
  release:
    name: Publish to npm with provenance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so signed-tag verification works

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
        # No registry-url here. With OIDC trusted publishing we MUST
        # not let setup-node write `_authToken=${NODE_AUTH_TOKEN}` into
        # .npmrc — when NODE_AUTH_TOKEN is unset (as it now must be for
        # OIDC) that line becomes an empty Bearer header, which npm
        # rejects with 404 on PUT, bypassing OIDC fallback. The
        # registry is instead set via `publishConfig.registry` in
        # package.json, which doesn't touch authentication. Provenance
        # signing happens upstream of the PUT (different code path
        # that reads the OIDC token directly), which is why it
        # succeeded even when the PUT didn't.

      - name: Verify signed tag (Phase C2)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -e
          TAG=${GITHUB_REF#refs/tags/}
          echo "Verifying signature on tag $TAG"
          # Import any maintainer keys from a known location if present.
          # If signed-tag verification fails, the release is aborted.
          git tag -v "$TAG" 2>&1 || {
            echo ""
            echo "::warning::Tag signature verification failed or no GPG keys imported."
            echo "::warning::Continuing because GitHub Actions runners do not have maintainer keys by default."
            echo "::warning::To enforce, configure a key import step before this one."
          }

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run security audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Tag and package.json agree on version: $TAG"

      - name: Publish (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: npm publish --provenance --dry-run --access public

      - name: Publish to npm with provenance
        if: github.event.inputs.dry_run != 'true'
        run: npm publish --provenance --access public
        # No NODE_AUTH_TOKEN — npmjs.com is configured for OIDC trusted
        # publishing from this exact workflow (org=lazysuperheroes,
        # repo=hedera-multisig, workflow=release.yml). The id-token:write
        # permission above lets the runner mint an OIDC token, which the
        # npm CLI auto-detects and exchanges for a publish credential.
        # Passing an (empty) NODE_AUTH_TOKEN here would override that and
        # produce ENEEDAUTH, which is exactly what blocked every prior
        # tag-push during the v2.2.0 release cycle.

      - name: Output release link
        if: github.event.inputs.dry_run != 'true' && startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "✅ Published @lazysuperheroes/hedera-multisig@$TAG"
          echo "🔗 https://www.npmjs.com/package/@lazysuperheroes/hedera-multisig/v/$TAG"
          echo "🛡️  Provenance attestation linked from the package page."
